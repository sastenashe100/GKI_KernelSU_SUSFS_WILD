name: 'Setup SukiSU-Ultra'
description: 'Replicate the working reference kernel: SukiSU-Ultra @ d43e2505 (v4.1.2) + manual_su + manual_hook + lsm_hooks + KPM'
inputs:
  ksu_branch:
    description: 'SukiSU branch (empty = d43e2505, the EXACT commit of the working reference kernel)'
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: 'Download and setup SukiSU-Ultra (guy commit d43e2505 = v4.1.2)'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail
        BRANCH="${{ inputs.ksu_branch }}"
        # d43e2505 = the EXACT SukiSU commit the working reference kernel was built from
        # (string "v4.1.2-d43e2505@builtin"). It defines MANUAL_SU + MANUAL_HOOK + LSM_HOOKS,
        # which are REQUIRED for su grants to persist across reboot. Newer commits dropped
        # MANUAL_HOOK/LSM_HOOKS and persistence broke.
        [ -z "$BRANCH" ] && BRANCH="d43e25056800ace4310e98df828de6eeca57f037"
        echo "Integrating SukiSU-Ultra ($BRANCH) — replicating reference kernel..."
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s "$BRANCH"

    - name: 'Apply SukiSU MANUAL HOOKS patch (v4.1.2 REQUIRES this — patches the kernel to CALL ksu hooks, else manager says "not installed")'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -uo pipefail
        # d43e2505 (v4.1.2) uses MANUAL hooks (not kprobes). The kernel source itself
        # must be patched to invoke the SukiSU hook functions (exec/open/stat/read/...).
        # Without this, SukiSU compiles in but the hooks are never called, so the
        # manager reports "Not installed". This is the same patch MiRinFork and the
        # reference kernel apply (ShirkNeko/SukiSU_patch/hooks).
        cd common
        curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU_patch/main/hooks/scope_min_manual_hooks_v1.6.patch" -o /tmp/ksu_hooks.patch
        if patch -p1 -F 3 --forward < /tmp/ksu_hooks.patch > /tmp/ksu_hooks.out 2>&1; then
          echo "[+] SukiSU manual hooks patch applied cleanly"
        else
          echo "[!] SukiSU hooks patch reported issues (rejects are OK if fuzz handled most hunks):"
          tail -25 /tmp/ksu_hooks.out
          echo "--- .rej files (these hooks will be MISSING) ---"
          find . -name "*.rej" 2>/dev/null | head
        fi
        echo "--- Kernel files now calling ksu hooks ---"
        grep -rlE "ksu_handle_" fs/ drivers/ kernel/ 2>/dev/null | head

    - name: 'KPM header compatibility fix (no-op on d43e2505 — its kpm uses only system includes, but kept for safety)'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail
        REPO="KernelSU"
        MODULES_DIR="."

        # SukiSU keeps UAPI headers OUTSIDE kernel/. Expose them under kernel/uapi.
        if [ ! -d "$MODULES_DIR/$REPO/kernel/uapi" ] && [ -d "$MODULES_DIR/$REPO/uapi" ]; then
          ln -sfn ../uapi "$MODULES_DIR/$REPO/kernel/uapi"
          echo "[+] Created symlink: kernel/uapi -> ../uapi"
        fi

        KPM_HEADER="$MODULES_DIR/$REPO/kernel/kpm/kpm.h"
        KPM_COMPACT="$MODULES_DIR/$REPO/kernel/kpm/compact.c"
        SUPERCALL_UAPI="$MODULES_DIR/$REPO/uapi/supercall.h"
        ALLOWLIST_H="$MODULES_DIR/$REPO/kernel/policy/allowlist.h"
        KSU_KBUILD="$MODULES_DIR/$REPO/kernel/Kbuild"

        # Each sed only fires if the pattern exists (grep -q guard) -> safe no-op on d43e2505
        [ -f "$KPM_HEADER" ] && grep -q '#include "uapi/supercall.h"' "$KPM_HEADER" 2>/dev/null && \
          sed -i 's|#include "uapi/supercall.h"|#include "../../uapi/supercall.h"|' "$KPM_HEADER" && echo "[+] kpm.h patched"
        [ -f "$SUPERCALL_UAPI" ] && grep -q '#include "uapi/app_profile.h"' "$SUPERCALL_UAPI" 2>/dev/null && \
          sed -i 's|#include "uapi/app_profile.h"|#include "app_profile.h"|' "$SUPERCALL_UAPI" && echo "[+] supercall.h patched"
        [ -f "$KPM_COMPACT" ] && grep -q '#include "policy/allowlist.h"' "$KPM_COMPACT" 2>/dev/null && \
          sed -i 's|#include "policy/allowlist.h"|#include "../policy/allowlist.h"|' "$KPM_COMPACT" && echo "[+] compact.c policy patched"
        [ -f "$KPM_COMPACT" ] && grep -q '#include "manager/manager_identity.h"' "$KPM_COMPACT" 2>/dev/null && \
          sed -i 's|#include "manager/manager_identity.h"|#include "../manager/manager_identity.h"|' "$KPM_COMPACT" && echo "[+] compact.c manager patched"
        [ -f "$ALLOWLIST_H" ] && grep -q '#include "uapi/app_profile.h"' "$ALLOWLIST_H" 2>/dev/null && \
          sed -i 's|#include "uapi/app_profile.h"|#include "../uapi/app_profile.h"|' "$ALLOWLIST_H" && echo "[+] allowlist.h patched"
        [ -f "$KSU_KBUILD" ] && ! grep -q '\-I$(KSU_KERNEL_DIR)/\.\.' "$KSU_KBUILD" 2>/dev/null && \
          sed -i 's|ccflags-y += -I$(KSU_KERNEL_DIR) -I$(KSU_KERNEL_DIR)/include|ccflags-y += -I$(KSU_KERNEL_DIR) -I$(KSU_KERNEL_DIR)/include -I$(KSU_KERNEL_DIR)/..|' "$KSU_KBUILD"
        echo "[+] KPM header compatibility pass complete"

    - name: 'Set SukiSU version'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        cd KernelSU/kernel
        COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD 2>/dev/null || echo 0)
        KSU_VERSION=$(expr $COMMITS_COUNT "+" 30000)
        sed -i "s/^KSU_VERSION_FALLBACK := 1\$/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" Kbuild 2>/dev/null || true
        KSU_GIT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")"
        sed -i "s/^KSU_VERSION_TAG_FALLBACK := v0.0.1\$/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" Kbuild 2>/dev/null || true
        echo "SukiSU version fallback: $KSU_VERSION"

    - name: 'Disable SUSFS (d43e2505 defaults KSU_SUSFS=y, but KSUN applies no susfs4ksu patch -> linux/susfs.h missing)'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail
        # d43e2505's Kconfig sets: config KSU_SUSFS { default y; depends on KSU; }
        # So enabling CONFIG_KSU=y auto-turns SUSFS ON. But feature_set=KSUN does NOT
        # apply the simonpunk susfs4ksu patch that provides include/linux/susfs.h, so
        # the build dies with "fatal error: 'linux/susfs.h' file not found".
        # SUSFS is for hiding files/mounts/uname — NOT needed for su persistence.
        # The persistence hooks (manual_su / manual_hook / lsm_hooks) all default y
        # independently of SUSFS, so disabling SUSFS keeps persistence intact.
        DEFCONFIG="common/arch/arm64/configs/gki_defconfig"
        if [ -f "$DEFCONFIG" ]; then
          sed -i '/^CONFIG_KSU_SUSFS=/d; /^CONFIG_KSU_SUSFS_/d; /^# CONFIG_KSU_SUSFS is not set/d' "$DEFCONFIG"
          printf '\n# CONFIG_KSU_SUSFS is not set\n' >> "$DEFCONFIG"
          echo "[+] KSU_SUSFS disabled in $DEFCONFIG (avoids missing linux/susfs.h; persistence hooks stay on)"
        else
          echo "WARN: $DEFCONFIG not found — cannot disable SUSFS"
        fi

    - name: 'Enable Kernel Configs — replicate reference kernel (manual_su + hooks = persistence)'
      uses: ./.github/actions/set-kernel-config
      with:
        # These THREE configs are what his working kernel has and ours lacked.
        # They are defined ONLY on commit d43e2505 (his). MANUAL_SU + the hook
        # mechanisms are what make su grants survive a reboot. (They also default
        # to y here, but we set them explicitly for clarity.)
        config_list: |
          CONFIG_KSU=y
          CONFIG_KSU_MANUAL_SU=y
          CONFIG_KSU_MANUAL_HOOK=y
          CONFIG_KSU_LSM_HOOKS=y
          CONFIG_KPM=y
