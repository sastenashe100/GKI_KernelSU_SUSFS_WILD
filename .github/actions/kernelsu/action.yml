name: 'Setup SukiSU-Ultra'
description: 'Integrate SukiSU-Ultra + KPM include path fix + version tracking'
inputs:
  ksu_branch:
    description: 'SukiSU branch (empty = 149f65faf)'
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: 'Download and setup SukiSU-Ultra'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail
        BRANCH="${{ inputs.ksu_branch }}"
        [ -z "$BRANCH" ] && BRANCH="149f65faf983d0affd7d80d2016cc3bc81574c79"
        echo "Integrating SukiSU-Ultra ($BRANCH)..."
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s "$BRANCH"

    - name: 'Fix KPM include paths + enable KPM compilation'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        KSU_ROOT=$(find . -maxdepth 2 -type d -name "kernel" -path "*KernelSU*" 2>/dev/null | head -1)
        [ -z "$KSU_ROOT" ] && KSU_ROOT=$(find . -maxdepth 3 -type d -name "kernel" -path "*kernelsu*" -not -path "*/repo/*" 2>/dev/null | head -1)
        echo "SukiSU source root: $KSU_ROOT"
        echo "=== Creating uapi/ directory with all needed headers ==="
        mkdir -p "$KSU_ROOT/uapi"
        find "$KSU_ROOT" -name "*.h" -path "*/supercall/*" -exec cp {} "$KSU_ROOT/uapi/" \; 2>/dev/null
        find "$KSU_ROOT" -name "*.h" -path "*/include/uapi/*" -exec cp {} "$KSU_ROOT/uapi/" \; 2>/dev/null
        find "$KSU_ROOT" -name "app_profile.h" -exec cp {} "$KSU_ROOT/uapi/" \; 2>/dev/null
        if [ ! -f "$KSU_ROOT/uapi/app_profile.h" ]; then
          printf '#ifndef __KSU_APP_PROFILE_H\n#define __KSU_APP_PROFILE_H\n#include <linux/types.h>\n#endif\n' > "$KSU_ROOT/uapi/app_profile.h"
          echo "Created stub app_profile.h"
        fi
        echo "=== uapi/ directory contents ==="
        ls -la "$KSU_ROOT/uapi/"
        echo "=== Adding -I$(src) to Kbuild ==="
        KB="$KSU_ROOT/Kbuild"
        echo 'ccflags-y += -I$(src)' >> "$KB"
        echo "Done"

    - name: 'Set SukiSU version (needed for App Profile)'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        cd KernelSU/kernel
        COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD)
        KSU_VERSION=$(expr $COMMITS_COUNT "+" 30000)
        sed -i "s/^KSU_VERSION_FALLBACK := 1\$/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" Kbuild
        KSU_GIT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")"
        sed -i "s/^KSU_VERSION_TAG_FALLBACK := v0.0.1\$/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" Kbuild
        echo "SukiSU version: $KSU_VERSION"

    - name: 'Enable Kernel Configs'
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KSU=y
          CONFIG_KPM=y
