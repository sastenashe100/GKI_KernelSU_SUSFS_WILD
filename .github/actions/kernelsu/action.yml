name: 'Setup SukiSU-Ultra'
description: 'Integrate SukiSU-Ultra + KPM header fix + version tracking'
inputs:
  ksu_branch:
    description: 'SukiSU branch (empty = 149f65faf)'
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: 'Download and setup SukiSU-Ultra'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail
        BRANCH="${{ inputs.ksu_branch }}"
        [ -z "$BRANCH" ] && BRANCH="149f65faf983d0affd7d80d2016cc3bc81574c79"
        echo "Integrating SukiSU-Ultra ($BRANCH)..."
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s "$BRANCH"

    - name: 'Fix KPM headers (inline supercall.h — eliminates missing include chain)'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        KSU_ROOT=$(find . -maxdepth 3 -type d -name "kernel" -path "*KernelSU*" 2>/dev/null | head -1)
        [ -z "$KSU_ROOT" ] && KSU_ROOT=$(find . -maxdepth 3 -type d -name "kernel" -path "*kernelsu*" -not -path "*/repo/*" 2>/dev/null | head -1)
        echo "SukiSU root: $KSU_ROOT"
        mkdir -p "$KSU_ROOT/uapi"
        printf '#ifndef __KSU_UAPI_SUPERCALL_H\n#define __KSU_UAPI_SUPERCALL_H\n#include <linux/types.h>\n#include <linux/uaccess.h>\ntypedef int (*ksu_ioctl_handler_t)(void __user *arg);\ntypedef bool (*ksu_perm_check_t)(void);\nstruct ksu_ioctl_cmd_map { unsigned int cmd; const char *name; ksu_ioctl_handler_t handler; ksu_perm_check_t perm_check; };\nint ksu_install_fd(void);\n#endif\n' > "$KSU_ROOT/uapi/supercall.h"
        printf '#ifndef __KSU_UAPI_APP_PROFILE_H\n#define __KSU_UAPI_APP_PROFILE_H\n#include <linux/types.h>\n#endif\n' > "$KSU_ROOT/uapi/app_profile.h"
        echo 'ccflags-y += -I$(src)' >> "$KSU_ROOT/Kbuild"
        echo "=== uapi/ created ===" && ls "$KSU_ROOT/uapi/"

    - name: 'Set SukiSU version (needed for App Profile)'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        cd KernelSU/kernel
        COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD)
        KSU_VERSION=$(expr $COMMITS_COUNT "+" 30000)
        sed -i "s/^KSU_VERSION_FALLBACK := 1\$/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" Kbuild
        KSU_GIT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")"
        sed -i "s/^KSU_VERSION_TAG_FALLBACK := v0.0.1\$/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" Kbuild
        echo "SukiSU version: $KSU_VERSION"

    - name: 'Enable Kernel Configs'
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KSU=y
          CONFIG_KPM=y
