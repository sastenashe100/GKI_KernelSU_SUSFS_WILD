name: 'Setup SukiSU-Ultra'
description: 'Integrate SukiSU-Ultra + KPM header fix (konoha-kernel-gci proven method) + version tracking'
inputs:
  ksu_branch:
    description: 'SukiSU branch (empty = 149f65faf, the manual_su commit where App Profile works)'
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: 'Download and setup SukiSU-Ultra'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail
        BRANCH="${{ inputs.ksu_branch }}"
        [ -z "$BRANCH" ] && BRANCH="149f65faf983d0affd7d80d2016cc3bc81574c79"
        echo "Integrating SukiSU-Ultra ($BRANCH)..."
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s "$BRANCH"

    - name: 'Fix KPM headers (konoha-kernel-gci PROVEN method — rewrites include paths at source level, no $(src) dependency)'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail
        REPO="KernelSU"
        MODULES_DIR="."

        # SukiSU keeps UAPI headers OUTSIDE kernel/. Expose them under kernel/uapi
        # so includes like "uapi/supercall.h" can resolve.
        if [ ! -d "$MODULES_DIR/$REPO/kernel/uapi" ] && [ -d "$MODULES_DIR/$REPO/uapi" ]; then
          ln -sfn ../uapi "$MODULES_DIR/$REPO/kernel/uapi"
          echo "[+] Created symlink: kernel/uapi -> ../uapi"
        fi

        KPM_HEADER="$MODULES_DIR/$REPO/kernel/kpm/kpm.h"
        KPM_COMPACT="$MODULES_DIR/$REPO/kernel/kpm/compact.c"
        SUPERCALL_UAPI="$MODULES_DIR/$REPO/uapi/supercall.h"
        ALLOWLIST_H="$MODULES_DIR/$REPO/kernel/policy/allowlist.h"
        KSU_KBUILD="$MODULES_DIR/$REPO/kernel/Kbuild"

        # 1) kpm.h: "uapi/supercall.h" -> "../../uapi/supercall.h"
        if [ -f "$KPM_HEADER" ] && grep -q '#include "uapi/supercall.h"' "$KPM_HEADER" 2>/dev/null; then
          sed -i 's|#include "uapi/supercall.h"|#include "../../uapi/supercall.h"|' "$KPM_HEADER"
          echo "[+] Patched kpm.h: uapi/supercall.h -> ../../uapi/supercall.h"
        fi

        # 2) uapi/supercall.h: "uapi/app_profile.h" -> "app_profile.h" (sibling inside uapi/)
        if [ -f "$SUPERCALL_UAPI" ] && grep -q '#include "uapi/app_profile.h"' "$SUPERCALL_UAPI" 2>/dev/null; then
          sed -i 's|#include "uapi/app_profile.h"|#include "app_profile.h"|' "$SUPERCALL_UAPI"
          echo "[+] Patched supercall.h: uapi/app_profile.h -> app_profile.h"
        fi

        # 3) compact.c: "policy/allowlist.h" -> "../policy/allowlist.h"  <-- THIS was the failing include
        if [ -f "$KPM_COMPACT" ] && grep -q '#include "policy/allowlist.h"' "$KPM_COMPACT" 2>/dev/null; then
          sed -i 's|#include "policy/allowlist.h"|#include "../policy/allowlist.h"|' "$KPM_COMPACT"
          echo "[+] Patched compact.c: policy/allowlist.h -> ../policy/allowlist.h"
        fi

        # 4) compact.c: "manager/manager_identity.h" -> "../manager/manager_identity.h"
        if [ -f "$KPM_COMPACT" ] && grep -q '#include "manager/manager_identity.h"' "$KPM_COMPACT" 2>/dev/null; then
          sed -i 's|#include "manager/manager_identity.h"|#include "../manager/manager_identity.h"|' "$KPM_COMPACT"
          echo "[+] Patched compact.c: manager/manager_identity.h -> ../manager/manager_identity.h"
        fi

        # 5) policy/allowlist.h: "uapi/app_profile.h" -> "../uapi/app_profile.h" (via the symlink)
        if [ -f "$ALLOWLIST_H" ] && grep -q '#include "uapi/app_profile.h"' "$ALLOWLIST_H" 2>/dev/null; then
          sed -i 's|#include "uapi/app_profile.h"|#include "../uapi/app_profile.h"|' "$ALLOWLIST_H"
          echo "[+] Patched allowlist.h: uapi/app_profile.h -> ../uapi/app_profile.h"
        fi

        # 6) Kbuild: add -I$(KSU_KERNEL_DIR)/.. so the repo root (with uapi/) is visible
        if [ -f "$KSU_KBUILD" ] && ! grep -q '\-I$(KSU_KERNEL_DIR)/\.\.' "$KSU_KBUILD" 2>/dev/null; then
          sed -i 's|ccflags-y += -I$(KSU_KERNEL_DIR) -I$(KSU_KERNEL_DIR)/include|ccflags-y += -I$(KSU_KERNEL_DIR) -I$(KSU_KERNEL_DIR)/include -I$(KSU_KERNEL_DIR)/..|' "$KSU_KBUILD"
          echo "[+] Patched Kbuild: added -I\$(KSU_KERNEL_DIR)/.."
        fi

        echo "[+] All SukiSU KPM header compatibility fixes applied."

    - name: 'Set SukiSU version (needed for App Profile manager IOCTL matching)'
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        cd KernelSU/kernel
        COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD)
        KSU_VERSION=$(expr $COMMITS_COUNT "+" 30000)
        sed -i "s/^KSU_VERSION_FALLBACK := 1\$/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" Kbuild
        KSU_GIT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")"
        sed -i "s/^KSU_VERSION_TAG_FALLBACK := v0.0.1\$/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" Kbuild
        echo "SukiSU version: $KSU_VERSION"

    - name: 'Enable Kernel Configs'
      uses: ./.github/actions/set-kernel-config
      with:
        config_list: |
          CONFIG_KSU=y
          CONFIG_KPM=y
